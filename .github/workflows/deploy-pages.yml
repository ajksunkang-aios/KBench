name: Deploy Benchview (Pages)

# Publishes benchview/ (the KBench benchmark catalog — verticals + sources) to
# GitHub Pages. The catalog is hand-written static HTML, so the only step is
# upload + deploy.

on:
  push:
    branches: [main]
    paths: ['benchview/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # benchview/ becomes the site root: benchview/index.html → /index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: benchview

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
